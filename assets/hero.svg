<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="#0f172a"/>
  
  <!-- Grid pattern -->
  <g opacity="0.1">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#64748b" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#64748b" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#64748b" stroke-width="1"/>
  </g>
  
  <!-- Unsorted segments (left side) -->
  <g id="unsorted">
    <rect x="50" y="220" width="25" height="80" fill="url(#grad1)" opacity="0.8" rx="3"/>
    <rect x="80" y="180" width="25" height="120" fill="url(#grad1)" opacity="0.8" rx="3"/>
    <rect x="110" y="240" width="25" height="60" fill="url(#grad1)" opacity="0.8" rx="3"/>
    <rect x="140" y="200" width="25" height="100" fill="url(#grad1)" opacity="0.8" rx="3"/>
    
    <rect x="190" y="160" width="25" height="140" fill="url(#grad2)" opacity="0.8" rx="3"/>
    <rect x="220" y="190" width="25" height="110" fill="url(#grad2)" opacity="0.8" rx="3"/>
    <rect x="250" y="230" width="25" height="70" fill="url(#grad2)" opacity="0.8" rx="3"/>
    
    <rect x="300" y="250" width="25" height="50" fill="url(#grad3)" opacity="0.8" rx="3"/>
    <rect x="330" y="210" width="25" height="90" fill="url(#grad3)" opacity="0.8" rx="3"/>
    <rect x="360" y="170" width="25" height="130" fill="url(#grad3)" opacity="0.8" rx="3"/>
  </g>
  
  <!-- Arrow and process -->
  <g id="process">
    <path d="M 420 200 L 520 200" stroke="#fbbf24" stroke-width="3" fill="none" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" from="0" to="10" dur="1s" repeatCount="indefinite"/>
    </path>
    <polygon points="520,200 505,193 505,207" fill="#fbbf24"/>
    
    <!-- Buffer indicator -->
    <rect x="440" y="150" width="60" height="100" fill="none" stroke="#fbbf24" stroke-width="2" stroke-dasharray="4,4" rx="5"/>
    <text x="470" y="265" font-family="monospace" font-size="11" fill="#fbbf24" text-anchor="middle">64K</text>
    <text x="470" y="278" font-family="monospace" font-size="11" fill="#fbbf24" text-anchor="middle">Buffer</text>
  </g>
  
  <!-- Sorted result (right side) -->
  <g id="sorted">
    <rect x="570" y="150" width="25" height="150" fill="url(#grad3)" opacity="0.9" rx="3"/>
    <rect x="600" y="160" width="25" height="140" fill="url(#grad3)" opacity="0.9" rx="3"/>
    <rect x="630" y="170" width="25" height="130" fill="url(#grad2)" opacity="0.9" rx="3"/>
    <rect x="660" y="180" width="25" height="120" fill="url(#grad2)" opacity="0.9" rx="3"/>
    <rect x="690" y="190" width="25" height="110" fill="url(#grad2)" opacity="0.9" rx="3"/>
    <rect x="720" y="200" width="25" height="100" fill="url(#grad1)" opacity="0.9" rx="3"/>
    <rect x="750" y="210" width="25" height="90" fill="url(#grad1)" opacity="0.9" rx="3"/>
    <rect x="780" y="220" width="25" height="80" fill="url(#grad1)" opacity="0.9" rx="3"/>
    <rect x="810" y="230" width="25" height="70" fill="url(#grad1)" opacity="0.9" rx="3"/>
    <rect x="840" y="240" width="25" height="60" fill="url(#grad1)" opacity="0.9" rx="3"/>
  </g>
  
  <!-- Title -->
  <text x="600" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="bold" fill="#f8fafc" text-anchor="middle">
    Block Merge Segment Sort
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">
    Cache-Friendly Adaptive Sorting • Up to 42× Faster • O(N log N)
  </text>
  
  <!-- Performance badge -->
  <g id="badge">
    <rect x="920" y="160" width="240" height="120" fill="#1e293b" stroke="#475569" stroke-width="2" rx="10"/>
    <text x="1040" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="bold" fill="#10b981" text-anchor="middle">42×</text>
    <text x="1040" y="238" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Faster on</text>
    <text x="1040" y="256" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Sorted Data</text>
    <circle cx="935" cy="190" r="8" fill="#10b981">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Language badges -->
  <g id="languages">
    <rect x="50" y="350" width="40" height="20" fill="#5c6bc0" rx="3"/>
    <text x="70" y="364" font-family="monospace" font-size="12" fill="#fff" text-anchor="middle">C</text>
    
    <rect x="100" y="350" width="50" height="20" fill="#00599c" rx="3"/>
    <text x="125" y="364" font-family="monospace" font-size="12" fill="#fff" text-anchor="middle">C++</text>
    
    <rect x="160" y="350" width="40" height="20" fill="#f7df1e" rx="3"/>
    <text x="180" y="364" font-family="monospace" font-size="12" fill="#000" text-anchor="middle">JS</text>
    
    <rect x="210" y="350" width="60" height="20" fill="#3776ab" rx="3"/>
    <text x="240" y="364" font-family="monospace" font-size="12" fill="#fff" text-anchor="middle">Python</text>
  </g>
</svg>
